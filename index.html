<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dados Municipais</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: linear-gradient(135deg, #1a3a2a 0%, #2d6a4f 50%, #40916c 100%); color: white; padding: 2.5rem 2rem; text-align: center; }
.header h1 { font-size: 2rem; font-weight: 800; margin-bottom: .3rem; letter-spacing: -.02em; }
.header p { opacity: .85; font-size: 1rem; font-weight: 300; }
.header .subtitle { margin-top: .3rem; font-size: .8rem; opacity: .6; }
.container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: white; border-radius: 12px; padding: 1.2rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.04); }
.stat-card .label { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: #64748b; font-weight: 600; }
.stat-card .value { font-size: 1.8rem; font-weight: 800; margin-top: .2rem; }
.section-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
.section-title span { background: #e9ecef; font-size: .75rem; padding: .15rem .6rem; border-radius: 20px; color: #495057; font-weight: 500; }
.filters { display: flex; flex-wrap: wrap; gap: .6rem; margin-bottom: 1rem; }
.filters select, .filters input { padding: .5rem .8rem; border: 1px solid #dee2e6; border-radius: 8px; font-family: inherit; font-size: .85rem; background: white; }
.session-card { background: white; border-radius: 12px; margin-bottom: 1rem; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.04); }
.session-header { padding: 1rem 1.2rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #f8fafc; border-bottom: 1px solid #e9ecef; }
.session-header .left { display: flex; align-items: center; gap: .8rem; flex-wrap: wrap; }
.session-header .date { font-weight: 700; font-size: 1rem; }
.session-header .type { font-size: .7rem; padding: .15rem .6rem; border-radius: 20px; font-weight: 600; }
.type-Ordinária { background: #dbeafe; color: #1d4ed8; }
.type-Extraordinária { background: #fef3c7; color: #b45309; }
.type-Outro { background: #e9ecef; color: #495057; }
.type-Instalação { background: #f0fdf4; color: #166534; }
.session-header .rep { font-size: .8rem; color: #64748b; }
.session-header .arrow { font-size: 1rem; color: #94a3b8; transition: transform .2s; }
.session-header.open .arrow { transform: rotate(180deg); }
.session-body { max-height: 0; overflow: hidden; transition: max-height .4s ease; }
.session-body.open { max-height: 4000px; }
.session-body-inner { padding: 1.2rem; }
.vote-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
.vote-table th { text-align: left; padding: .5rem .6rem; font-weight: 600; color: #64748b; font-size: .7rem; text-transform: uppercase; letter-spacing: .04em; border-bottom: 2px solid #e9ecef; }
.vote-table td { padding: .5rem .6rem; border-bottom: 1px solid #f1f3f5; vertical-align: top; }
.vote-table tr.clickable { cursor: pointer; }
.vote-table tr.clickable:hover td { background: #f0fdf4; }
.detail-icon { font-size: .7rem; color: #94a3b8; cursor: pointer; margin-left: .2rem; transition: color .15s; }
.detail-icon:hover { color: #2d6a4f; }
tr.clickable:hover .detail-icon { color: #2d6a4f; }
.vote-table tr.detail-row td { padding: 0; }
.vote-table .detail-inner { padding: .5rem 1rem 1rem 1rem; background: #f8fafc; border-bottom: 1px solid #e9ecef; font-size: .8rem; color: #475569; }
.vote-table .detail-inner .reason-label { font-weight: 600; color: #334155; margin-bottom: .3rem; }
.vote-table .detail-inner .source-link { display: inline-block; margin-top: .4rem; color: #2d6a4f; text-decoration: none; font-weight: 500; }
.vote-table .detail-inner .source-link:hover { text-decoration: underline; }
.badge { display: inline-flex; align-items: center; gap: .2rem; padding: .15rem .5rem; border-radius: 20px; font-weight: 600; font-size: .72rem; white-space: nowrap; }
.badge-favor { background: #d1fae5; color: #065f46; }
.badge-against { background: #fee2e2; color: #991b1b; }
.badge-abstention { background: #fef3c7; color: #92400e; }
.badge-novote { background: #f1f3f5; color: #64748b; }
.badge-mixed { background: #e0e7ff; color: #3730a3; }
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
.chart-card { background: white; border-radius: 12px; padding: 1.2rem; box-shadow: 0 1px 3px rgba(0,0,0,.06); border: 1px solid rgba(0,0,0,.04); }
.chart-card h3 { font-size: .9rem; font-weight: 600; margin-bottom: .8rem; color: #334155; }
.chart-card canvas { max-height: 260px; max-width: 100%; }
.party-grid { display: flex; flex-wrap: wrap; gap: .3rem; }
.party-tag { font-size: .68rem; padding: .1rem .45rem; border-radius: 4px; font-weight: 600; white-space: nowrap; }
.muni-selector { margin-top: 1rem; display: flex; gap: .4rem; flex-wrap: wrap; justify-content: center; }
.muni-tab { padding: .5rem 1.2rem; border: 1px solid rgba(255,255,255,.3); border-radius: 8px; font-family: inherit; font-size: .85rem; background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); font-weight: 500; cursor: pointer; transition: all .15s; outline: none; }
.muni-tab:hover { background: rgba(255,255,255,.2); color: white; }
.muni-tab.active { background: rgba(255,255,255,.95); color: #1a1a2e; border-color: transparent; }
.animal-card { background: #ecfdf5; border: 2px solid #2d6a4f; border-radius: 12px; padding: 1.2rem 1.4rem; margin-bottom: 1.5rem; font-size: .92rem; color: #14532d; line-height: 1.6; box-shadow: 0 4px 12px rgba(45,106,79,.1); }
.animal-card strong { color: #0f3b2a; }
.rep-bar { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: .5rem; }
.muni-link { display: inline-block; margin-top: 1rem; font-size: .85rem; color: #2d6a4f; text-decoration: none; padding: .5rem 1rem; border: 1px solid #bbf7d0; border-radius: 8px; background: #f0fdf4; font-weight: 500; transition: all .15s; }
.muni-link:hover { background: #2d6a4f; color: white; border-color: #2d6a4f; }
.placeholder-msg { text-align: center; padding: 3rem 1rem; color: #94a3b8; }
.placeholder-msg h3 { font-size: 1.2rem; margin-bottom: .5rem; color: #64748b; }
.placeholder-msg p { font-size: .9rem; }
.composition-grid { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.5rem; justify-content: center; }
.composition-item { font-size: .75rem; padding: .3rem .7rem; border-radius: 6px; font-weight: 600; color: white; }
.rep-bar .rep-link { grid-column: 1 / -1; font-size: .75rem; color: #2d6a4f; text-decoration: none; text-align: center; }
.rep-bar .rep-link:hover { text-decoration: underline; }
.news-section { margin-bottom: 1.5rem; }
.news-card { background: white; border-radius: 8px; padding: .75rem 1rem; margin-bottom: .5rem; border: 1px solid #e2e8f0; transition: border-color .15s; }
.news-card:hover { border-color: #2d6a4f; }
.news-card .news-title { font-weight: 600; font-size: .85rem; color: #1a1a2e; text-decoration: none; }
.news-card .news-title:hover { color: #2d6a4f; }
.news-card .news-meta { font-size: .72rem; color: #94a3b8; margin-top: .15rem; }
.news-card .news-summary { font-size: .78rem; color: #64748b; margin-top: .25rem; line-height: 1.4; }
@media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } .container { padding: 1rem; } .header h1 { font-size: 1.5rem; } }
</style>
</head>
<body>
<div class="header">
  <h1>Dados Municipais</h1>
  <p>Acompanhamento de atividade parlamentar autárquica</p>
   <div class="muni-selector">
    <button class="muni-tab active" data-muni="faro" onclick="switchMunicipality('faro')">Faro</button>
    <button class="muni-tab" data-muni="aljezur" onclick="switchMunicipality('aljezur')">Aljezur</button>
    <button class="muni-tab" data-muni="vrsa" onclick="switchMunicipality('vrsa')">Vila Real de Sto. António</button>
  </div>
  <div class="subtitle" id="subtitle"></div>
</div>
<div class="container">
  <div id="app"></div>
</div>
<script>
const MUNICIPALITIES = { faro: 'faro.json', aljezur: 'aljezur.json', vrsa: 'vrsa.json' };
const PARTIES = {
  'PS': '#e53e3e', 'PPD/PSD': '#2563eb', 'CH': '#1e293b', 'CDS-PP': '#0891b2',
  'CDU': '#dc2626', 'IL': '#7c3aed', 'MPT': '#059669', 'LIVRE': '#d97706',
  'PAN': '#2d6a4f', 'PSD': '#2563eb', 'AD': '#2563eb', 'Renascer': '#0d9488',
  'JF': '#64748b'
};
const PARTY_SHORT = { 'PPD/PSD': 'PSD', 'CDS-PP': 'CDS' };
function pn(name) { return PARTY_SHORT[name] || name; }

let currentData = null;
let chartInstances = [];

async function switchMunicipality(id) {
  document.querySelectorAll('.muni-tab').forEach(b => b.classList.toggle('active', b.dataset.muni === id));
  try {
    const resp = await fetch(MUNICIPALITIES[id]);
    if (!resp.ok) throw new Error('Failed to load');
    const data = await resp.json();
    currentData = data;
    renderAll(data);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="placeholder-msg"><h3>Erro ao carregar dados</h3><p>Não foi possível carregar os dados do município.</p></div>`;
  }
}

function renderAll(data) {
  chartInstances.forEach(c => c.destroy());
  chartInstances = [];

  const meta = data.meta;
  document.getElementById('subtitle').innerHTML = `${meta.name} · Atualizado: Maio 2026 ${meta.url ? `<a href="${meta.url}" target="_blank" style="color:#2d6a4f;text-decoration:none;font-size:.8rem" title="Site da Assembleia Municipal">🔗 AM</a>` : ''}`;

  const allSessions = data.sessions || [];
  const allItems = allSessions.flatMap(s => (s.items || []));
  const nSessions = allSessions.length;
  const nTotal = allItems.length;
  const nFavor = allItems.filter(i => i.pan === 'favor').length;
  const nAgainst = allItems.filter(i => i.pan === 'against').length;
  const nAbst = allItems.filter(i => i.pan === 'abstention').length;

  const app = document.getElementById('app');

  if (nTotal === 0) {
    const comp = meta.composition ? Object.entries(meta.composition).map(([p, c]) =>
      `<span class="composition-item" style="background:${c.color}">${pn(p)}: ${c.seats}</span>`
    ).join('') : '';

    app.innerHTML = `
      ${renderAnimalMeasures(meta)}
      ${renderNews(meta.news)}
      <div class="stats-grid">
        <div class="stat-card"><div class="label">Sessões</div><div class="value" style="color:#2d6a4f">${nSessions}</div></div>
        <div class="stat-card"><div class="label">Votações PAN</div><div class="value">${nTotal}</div></div>
      </div>
      ${comp ? `<div style="text-align:center;margin-top:1.5rem"><h3 style="font-size:.9rem;font-weight:600;color:#64748b;margin-bottom:.5rem">Composição da Assembleia</h3><div class="composition-grid">${comp}</div></div>` : ''}
      <div class="placeholder-msg">
        <h3>Sem dados de votação disponíveis</h3>
        <p>Os dados de votação para ${meta.name} ainda estão a ser compilados.<br>Volte mais tarde para consultar o registo de votações.</p>
      </div>
      <div class="rep-bar" style="margin-bottom:1rem">
        ${meta.panReps.map(r => renderRepCard(r)).join('')}
      </div>
      ${meta.url ? `<a href="${meta.url}" target="_blank" class="muni-link">🔗 Site oficial da Assembleia Municipal</a>` : ''}
    `;
    return;
  }

  const concordance = Math.round(nFavor / nTotal * 100);

  app.innerHTML = `
    ${renderAnimalMeasures(meta)}
    ${renderNews(meta.news)}
    <div class="stats-grid">
      <div class="stat-card"><div class="label">Sessões</div><div class="value" style="color:#2d6a4f">${nSessions}</div></div>
      <div class="stat-card"><div class="label">Votações PAN</div><div class="value">${nTotal}</div></div>
      <div class="stat-card"><div class="label">A Favor</div><div class="value" style="color:#2d6a4f">${nFavor}</div></div>
      <div class="stat-card"><div class="label">Contra</div><div class="value" style="color:#dc2626">${nAgainst}</div></div>
      <div class="stat-card"><div class="label">Abstenções</div><div class="value" style="color:#ca8a04">${nAbst}</div></div>
      <div class="stat-card"><div class="label">Concordância</div><div class="value" style="color:#2d6a4f">${concordance}%</div></div>
    </div>

    <div class="rep-bar" style="margin-bottom:1.5rem">
      ${meta.panReps.map(r => renderRepCard(r)).join('')}
    </div>
    ${meta.url ? `<a href="${meta.url}" target="_blank" class="muni-link">🔗 Site oficial da Assembleia Municipal</a>` : ''}

    <div class="charts-grid">
      <div class="chart-card"><h3>Votações PAN</h3><canvas id="chartPie"></canvas></div>
      <div class="chart-card"><h3>Alinhamento com outros partidos</h3><canvas id="chartAlign"></canvas></div>
      <div class="chart-card"><h3>Propostas por partido (como votou o PAN)</h3><canvas id="chartProposals"></canvas></div>
      <div class="chart-card"><h3>Concordância com cada partido</h3><canvas id="chartAgree"></canvas></div>
    </div>

    <div style="margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;">
      <span style="font-weight:600;font-size:.9rem">Sessões (${nSessions})</span>
      <select id="fType" onchange="renderSessions()" style="padding:.4rem .7rem;border:1px solid #dee2e6;border-radius:6px;font-size:.8rem">
        <option value="all">Todos os tipos</option>
        <option value="Ordinária">Ordinária</option>
        <option value="Extraordinária">Extraordinária</option>
      </select>
      <select id="fParty" onchange="renderSessions()" style="padding:.4rem .7rem;border:1px solid #dee2e6;border-radius:6px;font-size:.8rem">
        <option value="all">Proposto por qualquer partido</option>
      </select>
      <select id="fVote" onchange="renderSessions()" style="padding:.4rem .7rem;border:1px solid #dee2e6;border-radius:6px;font-size:.8rem">
        <option value="all">Qualquer voto</option>
        <option value="favor">A Favor</option>
        <option value="against">Contra</option>
        <option value="abstention">Abstenção</option>
      </select>
    </div>
    <div id="sessionsContainer"></div>
  `;

  const props = [...new Set(allItems.map(i => i.proposedBy))];
  document.getElementById('fParty').innerHTML += props.map(p => `<option value="${p}">${p}</option>`).join('');

  renderSessions();
  setupCharts(allItems);
}

function findRep(data, sessionNum) {
  return data.meta.panReps.find(r => r.sessions.includes(sessionNum));
}

function hasTransition(journey) {
  if (!journey || journey.length < 2) return false;
  const parties = journey.map(j => j.party);
  return new Set(parties).size > 1;
}

function renderRepCard(r) {
  const name = r.short || r.name;
  let html = `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:.6rem 1rem;margin-bottom:.5rem;width:100%">`;
  html += `<div style="display:flex;align-items:center;gap:.4rem;flex-wrap:wrap">👤 <strong>${name}</strong> ${repTypeBadge(r.type)}`;
  if (r.list) html += `<span style="font-size:.75rem;color:#64748b">· ${r.list}</span>`;
  if (r.role) html += `<span style="font-size:.75rem;color:#64748b">· ${r.role}</span>`;
  if (hasTransition(r.politicalJourney)) {
    html += `<span class="badge badge-against" style="font-size:.65rem">🔄 Transição partidária</span>`;
  }
  html += `</div>`;
  if (r.bio) html += `<div style="font-size:.75rem;color:#475569;max-width:100%;line-height:1.4;margin-top:.3rem">${r.bio}</div>`;
  if (r.politicalJourney && r.politicalJourney.length > 0) {
    html += `<div style="margin-top:.4rem;font-size:.75rem"><strong style="color:#334155">Percurso Político:</strong>`;
    html += r.politicalJourney.map(j => {
      const partyColor = PARTIES[j.party] || '#64748b';
      return `<div style="display:flex;align-items:baseline;gap:.4rem;padding:1px 0">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${partyColor};flex-shrink:0"></span>
        <span style="color:#64748b;min-width:100px">${j.period}</span>
        <span><strong>${j.party}</strong> — ${j.role}</span>
      </div>`;
    }).join('');
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function renderAnimalMeasures(meta) {
  if (!meta.animalMeasures) return '';
  return `<div class="animal-card"><strong>🐾 Medidas Animais:</strong> ${meta.animalMeasures}</div>`;
}

function renderNews(news) {
  if (!news || news.length === 0) return '';
  return `<div class="news-section">
    <div class="section-title">📰 Notícias <span>${news.length}</span></div>
    ${news.map(n => `<div class="news-card">
      <a href="${n.url}" target="_blank" class="news-title">${n.title}</a>
      <div class="news-meta">${n.source} · ${fmtDate(n.date)}</div>
      <div class="news-summary">${n.summary}</div>
    </div>`).join('')}
  </div>`;
}

const REP_TYPE_LABELS = { directa: 'PAN', independente: 'Independente', coligação: 'Coligação', outro: 'Outro' };
function repTypeBadge(type) {
  const label = REP_TYPE_LABELS[type] || type;
  const cls = type === 'directa' ? 'badge-favor' : 'badge-abstention';
  return `<span class="badge ${cls}" style="font-size:.65rem">${label}</span>`;
}

function renderSessions() {
  if (!currentData) return;
  const sessions = currentData.sessions || [];
  const fType = document.getElementById('fType').value;
  const fParty = document.getElementById('fParty').value;
  const fVote = document.getElementById('fVote').value;

  const filtered = sessions.reduce((acc, s) => {
    if (fType !== 'all' && s.type !== fType) return acc;
    let items = (s.items || []);
    if (fParty !== 'all') items = items.filter(i => i.proposedBy === fParty);
    if (fVote !== 'all') items = items.filter(i => i.pan === fVote);
    if (items.length > 0) acc.push({ ...s, items });
    return acc;
  }, []);

  document.getElementById('sessionsContainer').innerHTML = filtered.map((s, idx) => {
    const closed = filtered.length > 1 && idx > 0 ? '' : 'open';
    return `<div class="session-card">
      <div class="session-header ${closed}" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <div class="left">
          <span class="date">${fmtDate(s.date)}</span>
          <span class="type type-${s.type}">${s.type}</span>
          <span class="rep">${s.rep ? '👤 ' + s.rep + ' ' + repTypeBadge(findRep(currentData, s.session)?.type) : ''}</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="session-body ${closed}"><div class="session-body-inner">
        <p style="color:#64748b;font-size:.8rem;margin-bottom:.8rem">${s.local ? '📍 ' + s.local + ' · ' : ''}Sessão nº ${s.session}${s.source ? ' · <a href="' + s.source + '" target="_blank" style="color:#2d6a4f">Fonte</a>' : ''}</p>
        <table class="vote-table">
          <thead><tr><th>Item</th><th>Prop.</th><th>PAN</th><th>Votação</th></tr></thead>
          <tbody>${s.items.map((i, iIdx) => renderItemRow(s, i, s.session + '-' + iIdx)).join('')}</tbody>
        </table>
      </div></div>
    </div>`;
  }).join('');
}

function renderItemRow(session, item, uid) {
  const hasDetail = item.reason || item.note || session.source;
  const clickable = hasDetail ? ' clickable' : '';
  const toggle = hasDetail ? ` onclick="toggleItemDetail('${uid}')"` : '';
  return `<tr class="${clickable}"${toggle}>
    <td>${item.item}${hasDetail ? ' <span class="detail-icon">ⓘ</span>' : ''}</td>
    <td><span class="badge" style="background:#e9ecef;color:#495057">${item.proposedBy}</span></td>
    <td>${badge(item.pan)}</td>
    <td>${partyVotesHTML(item.votes)}</td>
  </tr>
  <tr class="detail-row" id="d-${uid}" style="display:none">
    <td colspan="4">
      <div class="detail-inner">
        ${item.reason ? `<div class="reason-label">Contexto:</div><p>${item.reason}</p>` : ''}
        ${item.note ? `<div class="reason-label">Nota:</div><p>${item.note}</p>` : ''}
        ${session.source ? `<a href="${session.source}" target="_blank" class="source-link">Ver sessão original →</a>` : ''}
      </div>
    </td>
  </tr>`;
}

function toggleItemDetail(uid) {
  const detailRow = document.getElementById('d-' + uid);
  if (!detailRow) return;
  detailRow.style.display = detailRow.style.display === 'table-row' ? 'none' : 'table-row';
}

function partyVotesHTML(votes) {
  const entries = Object.entries(votes).filter(([k]) => k !== 'IL');
  if (entries.length === 0) return '<span style="color:#94a3b8;font-size:.75rem">—</span>';
  return '<div class="party-grid">' + entries.map(([party, vote]) => {
    const color = PARTIES[party] || '#666';
    const label = pn(party);
    const cls = vote === 'favor' ? 'badge-favor' : vote === 'against' ? 'badge-against' : vote === 'abstention' ? 'badge-abstention' : 'badge-novote';
    return `<span class="party-tag ${cls}" style="border-left:3px solid ${color}">${label}: ${vLabel(vote)}</span>`;
  }).join('') + '</div>';
}

const vLabels = { favor: 'Fav', against: 'Con', abstention: 'Abs', mixed: 'Mist', '-': '—' };
function vLabel(v) { return vLabels[v] || v; }

function badge(v) {
  const m = { favor: ['badge-favor', 'Fav'], against: ['badge-against', 'Con'], abstention: ['badge-abstention', 'Abs'], commemorative: ['badge-novote', 'Com'] };
  const [c, l] = m[v] || ['badge-novote', v];
  return `<span class="badge ${c}">${l}</span>`;
}

function fmtDate(d) { return new Date(d + 'T12:00:00').toLocaleDateString('pt-PT', { day:'numeric', month:'long', year:'numeric' }); }

function setupCharts(allItems) {
  const nF = allItems.filter(i => i.pan === 'favor').length;
  const nA = allItems.filter(i => i.pan === 'against').length;
  const nAb = allItems.filter(i => i.pan === 'abstention').length;

  chartInstances.push(new Chart(document.getElementById('chartPie'), {
    type: 'doughnut',
    data: { labels: ['A Favor', 'Contra', 'Abstenção'], datasets: [{ data: [nF, nA, nAb], backgroundColor: ['#2d6a4f', '#dc2626', '#ca8a04'], borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
  }));

  const partyOrder = ['PS', 'PPD/PSD', 'CH', 'CDS-PP', 'CDU', 'LIVRE', 'IL', 'MPT', 'PSD'];
  const alignment = {};
  partyOrder.forEach(p => { alignment[p] = { agree: 0, total: 0 }; });
  allItems.forEach(item => {
    if (!item.votes) return;
    Object.entries(item.votes).forEach(([party, vote]) => {
      if (vote === '-' || !alignment[party]) return;
      alignment[party].total++;
      const pv = vote === 'mixed' ? 'favor' : vote;
      if (pv === item.pan) alignment[party].agree++;
    });
  });

  const labels = partyOrder.filter(p => alignment[p].total > 0);
  if (labels.length > 0) {
    const alignPct = labels.map(p => Math.round(alignment[p].agree / alignment[p].total * 100));
    const totalVotes = labels.map(p => alignment[p].total);

    chartInstances.push(new Chart(document.getElementById('chartAlign'), {
      type: 'bar',
      data: {
        labels: labels.map(p => pn(p)),
        datasets: [
          { label: 'Concordância com PAN (%)', data: alignPct, backgroundColor: labels.map(p => PARTIES[p] + '80'), borderColor: labels.map(p => PARTIES[p]), borderWidth: 2, borderRadius: 4 },
          { label: 'Total votações em comum', data: totalVotes, backgroundColor: 'rgba(100,116,139,.3)', borderRadius: 4 }
        ]
      },
      options: {
        responsive: true,
        scales: { y: { beginAtZero: true, max: 100, grid: { color: 'rgba(0,0,0,.05)' } } },
        plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + ctx.parsed.y + (ctx.datasetIndex === 0 ? '%' : '') } } }
      }
    }));

    const agreePct = labels.map(p => Math.round(alignment[p].agree / alignment[p].total * 100));
    chartInstances.push(new Chart(document.getElementById('chartAgree'), {
      type: 'radar',
      data: {
        labels: labels.map(p => pn(p)),
        datasets: [{
          label: 'Concordância com PAN (%)',
          data: agreePct,
          backgroundColor: 'rgba(45,106,79,.15)',
          borderColor: '#2d6a4f',
          pointBackgroundColor: labels.map(p => PARTIES[p]),
          borderWidth: 2,
          fill: true
        }]
      },
      options: { responsive: true, scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 20 } } }, plugins: { legend: { display: false } } }
    }));
  }

  const byProposer = {};
  allItems.filter(i => i.proposedBy !== 'Mesa' && i.proposedBy !== 'CM' && i.proposedBy !== '-' && ['favor','against','abstention'].includes(i.pan)).forEach(i => {
    if (!byProposer[i.proposedBy]) byProposer[i.proposedBy] = { favor: 0, against: 0, abstention: 0 };
    byProposer[i.proposedBy][i.pan]++;
  });
  const propLabels = Object.keys(byProposer);
  if (propLabels.length > 0) {
    chartInstances.push(new Chart(document.getElementById('chartProposals'), {
      type: 'bar',
      data: {
        labels: propLabels.map(p => pn(p)),
        datasets: [
          { label: 'PAN A Favor', data: propLabels.map(p => byProposer[p].favor), backgroundColor: '#2d6a4f' },
          { label: 'PAN Contra', data: propLabels.map(p => byProposer[p].against), backgroundColor: '#dc2626' },
          { label: 'PAN Abstenção', data: propLabels.map(p => byProposer[p].abstention), backgroundColor: '#ca8a04' }
        ]
      },
      options: { responsive: true, scales: { x: { stacked: true }, y: { stacked: true } }, plugins: { legend: { position: 'bottom' } } }
    }));
  }
}

switchMunicipality('faro');
</script>
